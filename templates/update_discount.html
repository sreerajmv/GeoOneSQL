<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Order Discount</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">eBiz</h3>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Create Order</h4>
                </div>
                <div class="card-body">
                    
                    {% if message %}
                        <div class="alert alert-{{ message_category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}

                    <form method="POST" action="/update_order_discount">
                        <div class="mb-3">
                            <label for="TargetSOID" class="form-label">SOID</label>
                            <input type="number" class="form-control" id="TargetSOID" name="TargetSOID" required placeholder="e.g., 190874">
                        </div>
                        <div class="mb-4">
                            <label for="NewDiscountAmount" class="form-label">Dis</label>
                            <input type="number" step="0.01" class="form-control" id="NewDiscountAmount" name="NewDiscountAmount" required placeholder="e.g., 13.45">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Update</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
